thresholds:
  JACCARD_MIN: 0.15
  MIN_INTERSECTION: 3
  TAU_STABILITY: 0.70
  CONS_JACCARD_MIN: 0.15
  CONS_K_MIN: 5

bootstrap:
  B: 200
  SUBSAMPLE_P: 0.85

run:
  seed: 123
  overwrite: false

pipelineA:
  run_steps: [1, 2, 3, 4, 5, 6, 7, 98]
  final_fallback_mode: "tier2_then_candidates"
  final_candidates_topn: null
  target_de_frac_min: 0.05
  target_de_frac_max: 0.25
  de_log2fc_ladder: [0.5, 1.0]
  de_p_ladder: [0.05, 0.01, 0.001]
  ora_min_enrich_ratio_mode: "adaptive"
  ora_min_enrich_ratio: null
  go_fdr_cutoff_strict:   0.05
  go_fdr_cutoff_relaxed:  0.20
  go_fallback_mode: "relax_fdr_then_topn"
  go_fallback_topn: 50

pipelineB:
  run_steps: [1, 2, 3, 4, 5, 6]
  target_tissue: "Temporal cortex"
  min_set_size: 10
  max_set_size: 500
  include_age: false
  gsea_seed: 7
  go_semantic_tau: 0.60
  solo_q_max: 0.05
  solo_abs_nes_min: 1.5
  final_mode: "consensus_first"
  final_top_n_per_direction: 5
  write_theme_summary: false
  agreement_mode: "relax_fdr_then_topn"
  agreement_relaxed_fdr: 0.20
  agreement_topn: 50
  optionA_enable: true
  optionA_quality_floor_q: 0.20
  optionA_allow_low_conf: false
