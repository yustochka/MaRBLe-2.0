# ── Active dataset ───────────────────────────────────────────────
# Exactly ONE `dataset:` block may be uncommented at a time.
# dataset_0 (reference cohort, SYMBOL gene IDs) is the default.
# DATASET 0
dataset:
  name: "dataset_0"
  expression_file:   "data/dataset_0/processed/processedMatrix.csv"
  metadata_file:     "data/dataset_0/processed/metaData.csv"
  statistics_file:   "data/dataset_0/processed/statisticsTable.csv"
  pathway2gene_file: "data/dataset_0/processed/Pathway2Gene.csv"
  p_adjusted_preferred: true
  p_col_adj:         "adj. p-value"
  log2fc_col:        "log2FC"
  abs_log2fc_min:    null
  sample_id_col:     "SampleID"
  group_col:         "Genotype"
  gene_id_type:      "SYMBOL"

