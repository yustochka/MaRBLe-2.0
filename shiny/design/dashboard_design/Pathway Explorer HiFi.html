<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pathway / GO Shortlist Explorer</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }
body {
  background: #dde3ec;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.canvas-wrap { width: 100vw; height: 100vh; overflow: hidden; }
</style>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
<div class="canvas-wrap" id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ─── TOKENS ─── */
const T = {
  navy:     '#18243a',
  slate:    '#2a4270',
  blue:     '#3560c8',
  blueMid:  '#4a76d4',
  sky:      '#6899e2',
  pale:     '#d8e6f8',
  paleBg:   '#eaf2fc',
  green:    '#1e7d58',
  greenLt:  '#d0eedf',
  ink:      '#18202e',
  inkMid:   '#546070',
  inkLight: '#9aaabb',
  surface:  '#ffffff',
  bg:       '#f2f6fb',
  border:   '#ccd6e8',
  borderLt: '#e2eaf4',
  shadow:   '0 1px 3px rgba(24,36,58,0.08), 0 0 0 1px rgba(24,36,58,0.06)',
  shadowMd: '0 4px 16px rgba(24,36,58,0.10), 0 0 0 1px rgba(24,36,58,0.07)',
};
const UI   = '-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif';
const MONO = '"DM Mono", "SFMono-Regular", Consolas, monospace';

/* ─── SHARED PRIMITIVES ─── */
function Card({ x=0, y=0, w=200, h=80, style={}, children }) {
  return (
    <div style={{position:'absolute', left:x, top:y, width:w, height:h,
      background:T.surface, borderRadius:8, boxShadow:T.shadow,
      overflow:'hidden', ...style}}>
      {children}
    </div>
  );
}

function CardHeader({ title, right, accent=false }) {
  return (
    <div style={{height:38, background: accent ? T.paleBg : T.bg,
      borderBottom:'1px solid ' + T.borderLt,
      display:'flex', alignItems:'center', padding:'0 14px',
      justifyContent:'space-between', flexShrink:0}}>
      <span style={{fontFamily:UI, fontSize:12, fontWeight:600, color:T.navy,
        letterSpacing:'-0.1px'}}>{title}</span>
      {right && <span style={{fontFamily:UI, fontSize:11, color:T.inkMid}}>{right}</span>}
    </div>
  );
}

function Divider({ x=0, y=0, w=200, style={} }) {
  return <div style={{position:'absolute',left:x,top:y,width:w,height:1,
    background:T.borderLt, ...style}} />;
}

function Tag({ label, color=T.blue, bg=T.paleBg }) {
  return (
    <span style={{display:'inline-flex', alignItems:'center',
      padding:'1px 7px', borderRadius:10,
      background:bg, fontFamily:UI, fontSize:10, fontWeight:600, color,
      letterSpacing:'0.02em'}}>
      {label}
    </span>
  );
}

function PrimaryBtn({ label, onClick, w=200, icon='' }) {
  return (
    <button onClick={onClick} style={{width:w, height:40, borderRadius:7,
      background:'linear-gradient(180deg,' + T.blueMid + ' 0%,' + T.blue + ' 100%)',
      border:'none', cursor:'pointer', display:'flex', alignItems:'center',
      justifyContent:'center', gap:7,
      fontFamily:UI, fontSize:13.5, fontWeight:600, color:'#fff',
      boxShadow:'0 1px 3px rgba(53,96,200,0.35), inset 0 1px 0 rgba(255,255,255,0.15)',
      letterSpacing:'-0.1px'}}>
      {icon && <span style={{fontSize:12}}>{icon}</span>}
      {label}
    </button>
  );
}

function GhostBtn({ label, onClick, style={} }) {
  return (
    <button onClick={onClick} style={{height:34, padding:'0 16px', borderRadius:6,
      background:'transparent', border:'1.5px solid ' + T.border,
      cursor:'pointer', fontFamily:UI, fontSize:12.5, fontWeight:500,
      color:T.inkMid, ...style}}>
      {label}
    </button>
  );
}

/* ─── NAV ─── */
function AppNav({ subtitle='', width=1200, activeStep=0 }) {
  const steps = ['Setup','Analysis','Results'];
  return (
    <div style={{position:'absolute',left:0,top:0,width,height:50,
      background:T.navy,
      boxShadow:'0 1px 0 rgba(255,255,255,0.06)',
      display:'flex',alignItems:'center',padding:'0 20px',gap:0}}>
      {/* logo */}
      <div style={{width:28,height:28,borderRadius:7,flexShrink:0,
        background:'linear-gradient(135deg,#6899e2 0%,#3560c8 100%)',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontFamily:UI,fontSize:12,fontWeight:700,color:'#fff',letterSpacing:'-0.5px'}}>P</div>
      <div style={{marginLeft:10,fontFamily:UI,fontSize:14,fontWeight:600,
        color:'#e8f0fc',letterSpacing:'-0.2px'}}>Pathway / GO Shortlist Explorer</div>
      {subtitle && (
        <div style={{marginLeft:12,paddingLeft:12,borderLeft:'1px solid rgba(255,255,255,0.12)',
          fontFamily:UI,fontSize:11,color:T.sky,opacity:0.85}}>{subtitle}</div>
      )}
      {/* stepper */}
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:0}}>
        {steps.map(function(s,i) {
          const done = i < activeStep, active = i === activeStep;
          return (
            <React.Fragment key={s}>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <div style={{width:20,height:20,borderRadius:'50%',
                  background: done ? T.green : active ? T.sky : 'rgba(255,255,255,0.12)',
                  border: '1.5px solid ' + (done ? T.green : active ? T.sky : 'rgba(255,255,255,0.2)'),
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontFamily:UI,fontSize:9,fontWeight:700,
                  color: (done||active) ? '#fff' : 'rgba(255,255,255,0.3)'}}>
                  {done ? '✓' : i+1}
                </div>
                <span style={{fontFamily:UI,fontSize:10.5,
                  color: active ? '#e8f0fc' : done ? T.greenLt : 'rgba(255,255,255,0.3)',
                  fontWeight: active ? 600 : 400}}>{s}</span>
              </div>
              {i < 2 && <div style={{width:28,height:1,background:'rgba(255,255,255,0.15)',margin:'0 6px'}} />}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCREEN 1 — INITIAL SETUP
══════════════════════════════════════════ */
function Screen1({ onRun }) {
  const [dataset, setDataset] = useState('dataset_0');
  const [pipeline, setPipeline] = useState('A');
  const [preset, setPreset] = useState('Default');
  const datasets = ['dataset_0','dataset_1','dataset_2','dataset_3'];

  return (
    <div style={{position:'relative',width:960,height:680,background:T.bg,overflow:'hidden'}}>
      <AppNav subtitle="RNA-seq Enrichment Analysis" width={960} activeStep={0} />

      {/* center card */}
      <div style={{position:'absolute',left:200,top:68,width:560,height:558,
        background:T.surface,borderRadius:12,boxShadow:T.shadowMd,overflow:'hidden'}}>

        {/* card header */}
        <div style={{height:48,background:T.paleBg,borderBottom:'1px solid ' + T.borderLt,
          display:'flex',alignItems:'center',padding:'0 24px',gap:10}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:T.blue}} />
          <span style={{fontFamily:UI,fontSize:13.5,fontWeight:600,color:T.navy}}>Configure Analysis</span>
        </div>

        <div style={{padding:'24px 24px 0'}}>

          {/* Dataset */}
          <div style={{marginBottom:20}}>
            <div style={{fontFamily:UI,fontSize:10.5,fontWeight:700,color:T.inkMid,
              letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:7}}>Dataset</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {datasets.map(function(d) {
                const sel = d===dataset;
                return (
                  <button key={d} onClick={function(){setDataset(d);}}
                    style={{padding:'6px 14px',borderRadius:6,cursor:'pointer',
                      background: sel ? T.paleBg : T.bg,
                      border: '1.5px solid ' + (sel ? T.blue : T.border),
                      fontFamily:UI,fontSize:12.5,fontWeight:sel?600:400,
                      color: sel ? T.blue : T.inkMid,
                      boxShadow: sel ? '0 0 0 3px rgba(53,96,200,0.10)' : 'none',
                      transition:'all 0.12s'}}>
                    {d}
                  </button>
                );
              })}
            </div>
            <div style={{marginTop:7,display:'flex',alignItems:'center',gap:5}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:T.green,flexShrink:0}} />
              <span style={{fontFamily:UI,fontSize:11,color:T.green}}>
                4 datasets auto-detected from <code style={{fontFamily:MONO,fontSize:10.5,background:T.greenLt,padding:'0 4px',borderRadius:3}}>data/</code>
              </span>
            </div>
          </div>

          <div style={{height:1,background:T.borderLt,margin:'0 0 20px'}} />

          {/* Pipeline */}
          <div style={{marginBottom:20}}>
            <div style={{fontFamily:UI,fontSize:10.5,fontWeight:700,color:T.inkMid,
              letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:8}}>Pipeline</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[
                ['A','Pipeline A','ORA + redundancy reduction + stability + consensus'],
                ['B','Pipeline B','CAMERA / fgsea + redundancy reduction + top-N shortlist'],
              ].map(function(item) {
                var key=item[0], name=item[1], desc=item[2];
                const sel = pipeline===key;
                return (
                  <button key={key} onClick={function(){setPipeline(key);}}
                    style={{display:'flex',alignItems:'flex-start',gap:12,
                      padding:'12px 14px',borderRadius:8,cursor:'pointer',textAlign:'left',
                      background: sel ? T.paleBg : T.surface,
                      border: '1.5px solid ' + (sel ? T.blue : T.border),
                      boxShadow: sel ? '0 0 0 3px rgba(53,96,200,0.10)' : 'none',
                      transition:'all 0.12s'}}>
                    <div style={{width:16,height:16,borderRadius:'50%',marginTop:1,flexShrink:0,
                      border:'2px solid ' + (sel ? T.blue : T.border),
                      background: sel ? T.blue : 'transparent'}} />
                    <div>
                      <div style={{fontFamily:UI,fontSize:13,fontWeight:600,color:T.navy,marginBottom:2}}>{name}</div>
                      <div style={{fontFamily:UI,fontSize:11.5,color:T.inkMid,lineHeight:1.4}}>{desc}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{height:1,background:T.borderLt,margin:'0 0 20px'}} />

          {/* Preset */}
          <div style={{marginBottom:20}}>
            <div style={{fontFamily:UI,fontSize:10.5,fontWeight:700,color:T.inkMid,
              letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:8}}>Analysis Preset</div>
            <div style={{display:'flex',gap:6}}>
              {['Default','Relaxed','Strict','Low coverage','Custom'].map(function(p) {
                const sel = preset===p;
                return (
                  <button key={p} onClick={function(){setPreset(p);}}
                    style={{padding:'6px 13px',borderRadius:20,cursor:'pointer',
                      background: sel ? T.blue : T.surface,
                      border: '1.5px solid ' + (sel ? T.blue : T.border),
                      fontFamily:UI,fontSize:12,fontWeight:sel?600:400,
                      color: sel ? '#fff' : T.inkMid,
                      transition:'all 0.12s'}}>
                    {p}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{height:1,background:T.borderLt,margin:'0 0 16px'}} />

          {/* Advanced */}
          <div style={{height:36,background:T.bg,borderRadius:6,border:'1px solid ' + T.borderLt,
            display:'flex',alignItems:'center',padding:'0 14px',gap:8,marginBottom:24,cursor:'pointer'}}>
            <span style={{fontFamily:UI,fontSize:13,color:T.inkLight}}>⊕</span>
            <span style={{fontFamily:UI,fontSize:12.5,color:T.inkMid}}>Advanced settings</span>
            <span style={{fontFamily:UI,fontSize:11,color:T.inkLight,marginLeft:'auto'}}>Click to expand</span>
          </div>

          {/* Run button */}
          <PrimaryBtn label="Run / Load Results" onClick={onRun} w={512} icon="▶" />
          <div style={{textAlign:'center',marginTop:10,
            fontFamily:UI,fontSize:11,color:T.inkLight,fontStyle:'italic'}}>
            Loads cached results automatically if already computed
          </div>

        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCREEN 2 — PROGRESS
══════════════════════════════════════════ */

    {label:'Consensus filtering (Jaccard 0.15)',          st:'pending'},

  ];

  return (
    <div style={{position:'relative',width:960,height:680,background:T.bg,overflow:'hidden'}}>
      <AppNav subtitle="dataset_0 · Pipeline A · Default" width={960} activeStep={1} />

      {/* main card */}
      <div style={{position:'absolute',left:176,top:68,width:608,height:530,
        background:T.surface,borderRadius:12,boxShadow:T.shadowMd,overflow:'hidden'}}>

        <CardHeader title="Analysis Running" right="dataset_0 · Pipeline A · Default" accent />

        <div style={{padding:'20px 24px'}}>

          {/* progress header */}
          <div style={{marginBottom:6}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
              <span style={{fontFamily:UI,fontSize:13,fontWeight:600,color:T.navy}}>
                Step 5 of 7 — Stability filtering
              </span>
              <span style={{fontFamily:UI,fontSize:11,color:T.inkMid}}>~45 s remaining</span>
            </div>
            {/* progress bar */}
            <div style={{height:6,background:T.pale,borderRadius:3,overflow:'hidden'}}>
              <div style={{width:'62%',height:'100%',
                background:'linear-gradient(90deg,' + T.blueMid + ',' + T.blue + ')',
                borderRadius:3}} />
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
              <span style={{fontFamily:UI,fontSize:10,color:T.inkLight}}>62%</span>
              <span style={{fontFamily:UI,fontSize:10,color:T.inkLight}}>100%</span>
            </div>
          </div>

          <div style={{height:1,background:T.borderLt,margin:'14px 0'}} />

          {/* step log */}
          <div style={{fontFamily:UI,fontSize:10.5,fontWeight:700,color:T.inkLight,
            letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:10}}>Pipeline Log</div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {steps.map(function(step) {
              const done=step.st==='done', active=step.st==='active';
              return (
                <div key={step.label} style={{display:'flex',alignItems:'center',gap:10,
                  padding:'8px 12px',borderRadius:6,

                  <div style={{width:18,height:18,borderRadius:'50%',flexShrink:0,

                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {done && <span style={{color:'#fff',fontSize:9,fontWeight:700}}>✓</span>}
                    {active && <span style={{color:'#fff',fontSize:8}}>●</span>}
                  </div>
                  <span style={{fontFamily:UI,fontSize:12.5,
                    color: done ? T.ink : active ? T.navy : T.inkLight,
                    fontWeight: active ? 600 : 400}}>{step.label}</span>
                  {active && <span style={{marginLeft:'auto',fontFamily:UI,fontSize:10.5,
                    color:T.sky,fontStyle:'italic'}}>running…</span>}
                </div>

            })}
          </div>

          <div style={{height:1,background:T.borderLt,margin:'16px 0 14px'}} />
          <div style={{display:'flex',justifyContent:'center'}}>
            <GhostBtn label="✕  Cancel run" />
          </div>
        </div>
      </div>

      {/* current run card */}
      <div style={{position:'absolute',left:808,top:68,width:136,
        background:T.surface,borderRadius:10,boxShadow:T.shadow,overflow:'hidden'}}>
        <div style={{height:32,background:T.paleBg,borderBottom:'1px solid ' + T.borderLt,
          display:'flex',alignItems:'center',padding:'0 12px'}}>
          <span style={{fontFamily:UI,fontSize:10,fontWeight:700,color:T.inkMid,
            letterSpacing:'0.06em',textTransform:'uppercase'}}>Current Run</span>
        </div>
        <div style={{padding:'10px 12px'}}>
          {[['Dataset','dataset_0'],['Pipeline','A'],['Preset','Default'],['Est.','~75 s']].map(function(row) {
            return (
              <div key={row[0]} style={{display:'flex',flexDirection:'column',marginBottom:8}}>
                <span style={{fontFamily:UI,fontSize:9.5,color:T.inkLight,textTransform:'uppercase',
                  letterSpacing:'0.05em',marginBottom:1}}>{row[0]}</span>
                <span style={{fontFamily:UI,fontSize:12,fontWeight:600,color:T.ink}}>{row[1]}</span>
              </div>

      </div>
    </div>

/* ══════════════════════════════════════════
   SCREEN 3 — MAIN RESULTS
══════════════════════════════════════════ */

  {name:'Inflammatory response',       src:'GO:BP',id:'GO:0006954',dir:'up',  rank:1,  q:'2.14e-4',stab:0.91,genes:42, clust:'C1',cons:true,  partner:'Platelet activation'},

  {name:'Platelet activation',         src:'WP',   id:'WP:0000268',dir:'up',  rank:3,  q:'5.02e-4',stab:0.85,genes:31, clust:'C2',cons:true,  partner:'Inflammatory response'},
  {name:'Collagen fibril organization',src:'GO:BP',id:'GO:0030199',dir:'up',  rank:4,  q:'8.31e-4',stab:0.82,genes:56, clust:'C1',cons:false, partner:'—'},

  {name:'Hemostasis',                  src:'WP',   id:'WP:0000003',dir:'up',  rank:9,  q:'2.78e-3',stab:0.69,genes:44, clust:'C4',cons:false, partner:'—'},
  {name:'Blood coagulation',           src:'GO:BP',id:'GO:0007596',dir:'up',  rank:10, q:'3.10e-3',stab:0.67,genes:29, clust:'C4',cons:false, partner:'—'},
  {name:'Integrin signaling pathway',  src:'WP',   id:'WP:0000010',dir:'up',  rank:11, q:'3.55e-3',stab:0.64,genes:71, clust:'C5',cons:false, partner:'—'},
];

function DotPlot({ terms, selected, width, height }) {
  const margin = {top:12, right:16, bottom:32, left:0};
  const plotW = width - margin.left - margin.right;
  const plotH = height - margin.top - margin.bottom;
  const barH = Math.floor(plotH / terms.length);

  // x-axis: -log10(q), max ~4
  const maxX = 4;
  const xScale = function(q) {
    return (-Math.log10(parseFloat(q)) / maxX) * plotW;
  };

  // dot size: map genes 29-118 → r 4-14
  const rScale = function(n) {
    return 4 + ((n - 29) / (118 - 29)) * 10;
  };

  // stability color
  const stabColor = function(s) {
    if (s >= 0.85) return T.green;
    if (s >= 0.75) return T.blue;
    return T.inkLight;
  };

  const xTicks = [0,1,2,3,4];

  return (
    <svg width={width} height={height} style={{display:'block',overflow:'visible'}}>
      {/* grid lines */}
      {xTicks.map(function(v) {
        const cx = margin.left + (v/maxX)*plotW;
        return (
          <g key={v}>
            <line x1={cx} y1={margin.top} x2={cx} y2={margin.top+plotH}
              stroke={T.borderLt} strokeWidth={1} strokeDasharray={v===0?"":"3,3"} />
            <text x={cx} y={margin.top+plotH+14}
              textAnchor="middle" fontFamily={UI} fontSize={9} fill={T.inkLight}>{v}</text>
          </g>
        );
      })}

      {/* x-axis label */}
      <text x={margin.left+plotW/2} y={height-2}
        textAnchor="middle" fontFamily={UI} fontSize={9} fill={T.inkMid}>
        −log₁₀(q-value)
      </text>

      {/* rows */}
      {terms.map(function(term, i) {
        const cy = margin.top + i * barH + barH/2;
        const dotX = margin.left + xScale(term.q);
        const r = rScale(term.genes);
        const isSel = selected === i;

        return (
          <g key={term.name}>
            {/* row bg */}
            {isSel && <rect x={margin.left} y={margin.top + i*barH} width={plotW} height={barH}
              fill={T.paleBg} rx={3} />}
            {/* row label */}

function S4Slider({ label, val, min, max, hint }) {
  const pct = ((parseFloat(val)-parseFloat(min))/(parseFloat(max)-parseFloat(min))*100).toFixed(1);
  return (
    <div style={{marginBottom:22}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:7}}>
        <span style={{fontFamily:UI,fontSize:12,fontWeight:500,color:T.ink}}>{label}</span>
        <span style={{fontFamily:MONO,fontSize:12.5,fontWeight:600,color:T.navy}}>{val}</span>
      </div>
      <div style={{position:'relative',height:5,background:T.pale,borderRadius:3}}>
        <div style={{position:'absolute',left:0,top:0,height:'100%',
          width:pct+'%',background:T.blue,borderRadius:3}} />
        <div style={{position:'absolute',top:-7,left:pct+'%',
          width:18,height:18,borderRadius:'50%',
          border:'2px solid ' + T.blue,background:T.surface,
          boxShadow:'0 1px 4px rgba(53,96,200,0.25)',
          transform:'translateX(-50%)'}} />
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
        <span style={{fontFamily:UI,fontSize:9.5,color:T.inkLight}}>{min}</span>
        <span style={{fontFamily:UI,fontSize:9.5,color:T.inkLight}}>{max}</span>
      </div>
      {hint && <div style={{fontFamily:UI,fontSize:10.5,color:T.inkLight,marginTop:3,fontStyle:'italic'}}>{hint}</div>}
    </div>
  );
}

function S4Number({ label, val, hint }) {
  return (
    <div style={{marginBottom:22}}>
      <div style={{fontFamily:UI,fontSize:12,fontWeight:500,color:T.ink,marginBottom:7}}>{label}</div>
      <div style={{width:110,height:36,background:T.bg,border:'1.5px solid ' + T.border,

      {hint && <div style={{fontFamily:UI,fontSize:10.5,color:T.inkLight,marginTop:3,fontStyle:'italic'}}>{hint}</div>}

  );
}

  const s = screens[tweaks.activeScreen];

  return (
    <>
      <DesignCanvas>
        <DCSection id="main" title="Pathway/GO Shortlist Explorer — Hi-Fi Prototype">
          <DCArtboard id={s.id} label={s.label} width={s.w} height={s.h}>
            {s.comp()}
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Screen">
          <TweakRadio
            tweakKey="activeScreen"
            value={tweaks.activeScreen}
            options={[
              {label:'1 Setup',    value:0},
              {label:'2 Progress', value:1},
              {label:'3 Results',  value:2},
              {label:'4 Advanced', value:3},
            ]}
            onChange={function(v){setTweak('activeScreen',v);}}
          />
        </TweakSection>
        <TweakSection label="Tip">
          <div style={{fontFamily:'sans-serif',fontSize:11,color:'#888',lineHeight:1.6}}>
            Screen 1: click dataset chips &amp; pipeline cards.<br/>
            Screen 3: click table rows to update the detail panel &amp; dot plot.<br/>
            Screen 4: click tabs to switch parameter groups.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
